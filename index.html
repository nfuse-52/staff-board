<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <h1 class="logo">Staff Board</h1>
      <div class="header-controls">
        <input type="text" id="searchInput" class="search-input" placeholder="名前・部署で検索...">
        <button class="btn-add" id="openModalBtn">＋ 社員を追加</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="filter-bar">
      <button class="filter-btn active" data-dept="all">すべて</button>
    </div>
    <div class="staff-grid" id="staffGrid">
      <div class="loading">読み込み中...</div>
    </div>
  </main>

  <!-- 追加・編集モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">社員を追加</h2>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>
      <form id="staffForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="inputName">名前 <span class="required">*</span></label>
          <input type="text" id="inputName" placeholder="例：田中 太郎" required>
        </div>
        <div class="form-group">
          <label for="inputDept">部署</label>
          <input type="text" id="inputDept" placeholder="例：エンジニアリング">
        </div>
        <div class="form-group">
          <label for="inputPosition">役職</label>
          <input type="text" id="inputPosition" placeholder="例：エンジニア">
        </div>
        <div class="form-group">
          <label for="inputBio">一言・自己紹介</label>
          <textarea id="inputBio" placeholder="例：コーヒーが好きです。よろしくお願いします！" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="cancelBtn">キャンセル</button>
          <button type="submit" class="btn-save" id="saveBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>削除の確認</h2>
        <button class="modal-close" id="closeDeleteBtn">✕</button>
      </div>
      <p class="delete-msg">この社員を削除しますか？この操作は取り消せません。</p>
      <div class="form-actions">
        <button type="button" class="btn-cancel" id="cancelDeleteBtn">キャンセル</button>
        <button type="button" class="btn-danger" id="confirmDeleteBtn">削除する</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
